apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: perf-spark1
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: swr.cn-north-4.myhuaweicloud.com/cloud-course-2023116336/pyspark-perf:v1
  imagePullPolicy: Always
  mainApplicationFile: local:///opt/spark/work/perf_compare.py
  arguments:
    - "spark"
  sparkVersion: "3.4.0"
  sparkConf:
    spark.executor.memoryOverhead: "128m"
    spark.driver.memoryOverhead: "128m"
    spark.sql.shuffle.partitions: "2"
    spark.default.parallelism: "2"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    coreRequest: "100m"
    memory: "512m"
    serviceAccount: spark
    env:
      - name: PERF_MODE
        value: "spark"
  executor:
    cores: 1
    coreRequest: "100m"
    instances: 1
    memory: "512m"
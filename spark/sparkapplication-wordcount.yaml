apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: pyspark-wordcount
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: swr.cn-north-4.myhuaweicloud.com/cloud-course-2023116336/pyspark:v9
  imagePullPolicy: Always
  mainApplicationFile: local:///opt/spark/work/wordcount.py
  sparkVersion: "3.4.0"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    coreRequest: "100m"
    memory: "512m"
    serviceAccount: spark
  executor:
    cores: 1
    coreRequest: "100m"
    instances: 1
    memory: "512m"
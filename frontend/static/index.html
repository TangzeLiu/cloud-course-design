  <button onclick="ping()">测试后端 API</button>
  <pre id="result"></pre>

  <script>
    async function ping() {
      const res = await fetch('/api/ping');
      const data = await res.json();
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    }
  </script>
